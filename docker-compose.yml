# PostgreSQL local para desenvolvimento.
# Suba com:  docker compose up -d
# Pare com:  docker compose down   (use -v para apagar os dados também)
services:
  db:
    image: postgres:16-alpine
    container_name: simple_arch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: simple
      POSTGRES_PASSWORD: simple_dev_pwd
      POSTGRES_DB: simple_arch
    # Host 5433 -> container 5432 (evita conflito com um Postgres local na 5432).
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U simple -d simple_arch']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
